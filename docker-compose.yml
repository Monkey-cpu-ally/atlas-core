services:
  atlas:
    build: .
    ports:
      - "8001:8001"
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: atlas
      QDRANT_URL: http://qdrant:6333
      OLLAMA_HOST: http://host.docker.internal:11434
    depends_on:
      mongo:
        condition: service_started
      qdrant:
        condition: service_started
    volumes:
      - .:/app

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - atlas_mongo:/data/db
    ports:
      - "27017:27017"

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - atlas_qdrant:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"

volumes:
  atlas_mongo:
  atlas_qdrant:
