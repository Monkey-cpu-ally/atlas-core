name: Visual Ecosystem

on:
  pull_request:
    paths:
      - "atlas_core/visual.py"
      - "frontend/**"
      - "clients/atlas-godot/**"
      - "clients/atlas-desktop/**"
      - "clients/atlas-unreal/**"
      - "visual-systems/**"
      - "shared/protocols/**"
      - "tests/test_visual_hub.py"
      - "tests/test_genesis_*.py"
      - ".github/workflows/visual-ecosystem.yml"
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    env:
      MONGO_URL: mongodb://localhost:27017
      DB_NAME: atlas_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r backend/requirements.txt pytest
      - name: Run visual and GENESIS smoke tests
        run: pytest -q tests/test_visual_hub.py tests/test_genesis_*.py

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: corepack enable
      - run: yarn install --frozen-lockfile
      - run: CI=false yarn build

  tauri-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/atlas-desktop/src-tauri
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Prepare frontend distribution placeholder
        run: |
          mkdir -p ../../../frontend/build
          printf '<!doctype html><html><body><div id="root"></div></body></html>' > ../../../frontend/build/index.html
      - uses: dtolnay/rust-toolchain@stable
      - name: Run cargo check
        env:
          RUST_BACKTRACE: full
        run: cargo check --verbose
