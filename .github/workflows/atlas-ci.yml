name: ATLAS CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Compile Python
        run: python -m compileall . ../atlas_core ../src
      - name: Engineering adapter tests
        run: pytest tests/test_engineering_tool_adapters.py -v
      - name: Core API tests
        run: pytest tests/test_atlas_api.py -q
        continue-on-error: true

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose
        run: docker compose config
      - name: Build ATLAS image
        run: docker build -t atlas-core:ci .
