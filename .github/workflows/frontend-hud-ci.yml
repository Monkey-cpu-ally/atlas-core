name: ATLAS Frontend HUD CI

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-hud-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-hud-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-hud-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-hud:
    name: Build and test HUD
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        shell: bash
        working-directory: frontend

    env:
      CI: "true"
      REACT_APP_BACKEND_URL: http://127.0.0.1:8000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable Yarn
        run: corepack enable

      - name: Show tool versions
        run: |
          node --version
          yarn --version

      - name: Install frontend dependencies
        run: yarn install --non-interactive --no-progress

      - name: Run HUD tests
        run: yarn test --watchAll=false --passWithNoTests

      - name: Build production HUD
        run: yarn build

      - name: Write failure summary
        if: failure()
        run: |
          mkdir -p ../test_reports
          {
            echo "# ATLAS Frontend HUD CI Failure"
            echo
            echo "Commit: $GITHUB_SHA"
            echo "Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo
            echo "Inspect the failed step, repair the smallest root cause, preserve HUD features, and add a regression test."
          } > ../test_reports/frontend-hud-ci-failure.md

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: atlas-frontend-hud-ci-diagnostics
          path: |
            frontend/build/
            frontend/npm-debug.log
            frontend/yarn-error.log
            test_reports/frontend-hud-ci-failure.md
          if-no-files-found: ignore
