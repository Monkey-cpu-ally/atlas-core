name: ATLAS Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "atlas_core/**"
      - "knowledge_bank/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "atlas_core/**"
      - "knowledge_bank/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PYTHONPATH: ${{ github.workspace }}/backend:${{ github.workspace }}
      MONGO_URL: mongodb://localhost:27017
      DB_NAME: atlas_ci_test
      CORS_ORIGINS: "*"
      SENTINEL_AUTONOMIC_INTERVAL_S: "3600"
      ATLAS_TEST_MODE: "1"
      OPENAI_API_KEY: test-key-not-used
      ELEVENLABS_API_KEY: test-key-not-used
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python syntax compile check
        run: |
          python -m compileall backend atlas_core

      - name: Run backend unit tests
        working-directory: backend
        run: |
          pytest -q
