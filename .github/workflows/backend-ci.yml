name: ATLAS Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "atlas_core/**"
      - "knowledge_bank/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "atlas_core/**"
      - "knowledge_bank/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PYTHONPATH: ${{ github.workspace }}/backend:${{ github.workspace }}
      MONGO_URL: mongodb://localhost:27017
      DB_NAME: atlas_ci_test
      CORS_ORIGINS: "*"
      REACT_APP_BACKEND_URL: http://127.0.0.1:8000
      ATLAS_BACKEND_URL: http://127.0.0.1:8001
      SENTINEL_AUTONOMIC_INTERVAL_S: "3600"
      ATLAS_TEST_MODE: "1"
      OPENAI_API_KEY: test-key-not-used
      ELEVENLABS_API_KEY: test-key-not-used
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Prepare CI environment
        run: |
          sudo mkdir -p /app/frontend /app/backend
          sudo chmod 777 /app/backend
          printf 'REACT_APP_BACKEND_URL=http://127.0.0.1:8000\n' | sudo tee /app/frontend/.env >/dev/null
          mkdir -p test_reports

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip 2>&1 | tee ../test_reports/pip-upgrade.log
          pip install -r requirements.txt 2>&1 | tee ../test_reports/pip-install.log

      - name: Python syntax compile check
        run: |
          python -m compileall backend atlas_core 2>&1 | tee test_reports/compile.log

      - name: Start backend API servers
        working-directory: backend
        run: |
          nohup python -m uvicorn server:app --host 127.0.0.1 --port 8000 > ../test_reports/server-8000.log 2>&1 &
          echo $! > ../test_reports/server-8000.pid
          nohup python -m uvicorn server:app --host 127.0.0.1 --port 8001 > ../test_reports/server-8001.log 2>&1 &
          echo $! > ../test_reports/server-8001.pid

          for port in 8000 8001; do
            ready=0
            for attempt in $(seq 1 60); do
              if curl --silent --fail "http://127.0.0.1:${port}/api/" >/dev/null; then
                ready=1
                break
              fi
              sleep 1
            done
            if [ "$ready" -ne 1 ]; then
              echo "Backend failed to become ready on port ${port}."
              cat "../test_reports/server-${port}.log" || true
              exit 1
            fi
          done

      - name: Run deterministic Alpha gate
        working-directory: backend
        run: |
          pytest -q tests/test_iter23_d3_d6.py ../tests/test_visual_hub.py \
            2>&1 | tee ../test_reports/alpha-gate.log

      - name: Run full legacy suite audit
        id: legacy-audit
        continue-on-error: true
        working-directory: backend
        run: |
          set +e
          pytest -q 2>&1 | tee ../test_reports/legacy-pytest.log
          status=${PIPESTATUS[0]}
          echo "$status" > ../test_reports/legacy-pytest.exitcode
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Publish audit summary
        if: always()
        run: |
          {
            echo "## ATLAS backend verification"
            echo "- Deterministic Alpha gate: blocking"
            echo "- Full legacy suite: diagnostic while stale external-key and historical-contract tests are modernized"
            echo "- Legacy audit exit code: ${{ steps.legacy-audit.outputs.status || 'not-run' }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload backend verification reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atlas-backend-verification
          path: test_reports/

      - name: Create repair issue on blocking failure
        if: failure() && github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `ATLAS CI Repair Needed: ${context.sha.substring(0, 7)}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '## ATLAS blocking CI gate failed',
              '',
              `Commit: \`${context.sha}\``,
              `Run: ${runUrl}`,
              '',
              'Inspect the atlas-backend-verification artifact and repair the deterministic gate without deleting features.'
            ].join('\n');

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci-failure,atlas-repair'
            });
            if (!existing.data.find(issue => issue.title === title)) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['ci-failure', 'atlas-repair']
              });
            }
