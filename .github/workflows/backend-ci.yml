name: ATLAS Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "atlas_core/**"
      - "knowledge_bank/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "atlas_core/**"
      - "knowledge_bank/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PYTHONPATH: ${{ github.workspace }}/backend:${{ github.workspace }}
      MONGO_URL: mongodb://localhost:27017
      DB_NAME: atlas_ci_test
      CORS_ORIGINS: "*"
      REACT_APP_BACKEND_URL: http://127.0.0.1:8000
      SENTINEL_AUTONOMIC_INTERVAL_S: "3600"
      ATLAS_TEST_MODE: "1"
      OPENAI_API_KEY: test-key-not-used
      ELEVENLABS_API_KEY: test-key-not-used
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Prepare CI environment
        run: |
          sudo mkdir -p /app/frontend
          printf 'REACT_APP_BACKEND_URL=http://127.0.0.1:8000\n' | sudo tee /app/frontend/.env >/dev/null
          mkdir -p test_reports

      - name: Install backend dependencies
        working-directory: backend
        run: |
          set +e
          python -m pip install --upgrade pip 2>&1 | tee ../test_reports/pip-upgrade.log
          upgrade_status=${PIPESTATUS[0]}
          if [ "$upgrade_status" -ne 0 ]; then
            echo "$upgrade_status" > ../test_reports/pip-install.exitcode
            exit "$upgrade_status"
          fi
          pip install -r requirements.txt 2>&1 | tee ../test_reports/pip-install.log
          status=${PIPESTATUS[0]}
          echo "$status" > ../test_reports/pip-install.exitcode
          exit "$status"

      - name: Python syntax compile check
        run: |
          set +e
          python -m compileall backend atlas_core 2>&1 | tee test_reports/compile.log
          status=${PIPESTATUS[0]}
          echo $status > test_reports/compile.exitcode
          exit $status

      - name: Start backend API servers
        working-directory: backend
        run: |
          nohup python -m uvicorn server:app --host 127.0.0.1 --port 8000 > ../test_reports/server-8000.log 2>&1 &
          echo $! > ../test_reports/server-8000.pid
          nohup python -m uvicorn server:app --host 127.0.0.1 --port 8001 > ../test_reports/server-8001.log 2>&1 &
          echo $! > ../test_reports/server-8001.pid

          for port in 8000 8001; do
            ready=0
            for attempt in $(seq 1 60); do
              if curl --silent --fail "http://127.0.0.1:${port}/api/" >/dev/null; then
                ready=1
                break
              fi
              sleep 1
            done
            if [ "$ready" -ne 1 ]; then
              echo "Backend failed to become ready on port ${port}."
              cat "../test_reports/server-${port}.log" || true
              exit 1
            fi
          done

      - name: Run backend unit and integration tests
        working-directory: backend
        run: |
          set +e
          pytest -q 2>&1 | tee ../test_reports/pytest.log
          status=${PIPESTATUS[0]}
          echo $status > ../test_reports/pytest.exitcode
          exit $status

      - name: Build ATLAS repair report
        if: failure()
        run: |
          cat > test_reports/atlas_repair_report.md <<'EOF'
          # ATLAS CI Repair Report

          CI failed. ATLAS should inspect this report, identify the root cause, and create a fix in the next coding session.

          ## Commit
          `${{ github.sha }}`

          ## Branch
          `${{ github.ref_name }}`

          ## Run
          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          ## Repair Protocol
          1. Read `pip-install.log` first when dependency installation failed.
          2. Read `compile.log` when compilation failed.
          3. Read `server-8000.log` and `server-8001.log` when startup failed.
          4. Read `pytest.log` when tests ran.
          5. Identify the smallest safe fix.
          6. Do not remove ATLAS features to make tests pass.
          7. Add or update tests when fixing the bug.
          8. Re-run CI after the fix.
          EOF

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: atlas-ci-failure-report
          path: test_reports/

      - name: Create repair issue on CI failure
        if: failure() && github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `ATLAS CI Repair Needed: ${context.sha.substring(0, 7)}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '## ATLAS CI failed',
              '',
              `Commit: \`${context.sha}\``,
              `Branch: \`${context.ref}\``,
              `Run: ${runUrl}`,
              '',
              '### Required action',
              '- Inspect the uploaded `atlas-ci-failure-report` artifact.',
              '- Fix the root cause without deleting ATLAS features.',
              '- Add or update tests for the fix.',
              '- Re-run CI until green.',
              '',
              '### ATLAS repair rule',
              'Treat this as a repair mission for Ajani/Hermes/Minerva/Council review.'
            ].join('\n');

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci-failure,atlas-repair'
            });

            const already = existing.data.find(issue => issue.title === title);
            if (!already) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['ci-failure', 'atlas-repair']
              });
            }
