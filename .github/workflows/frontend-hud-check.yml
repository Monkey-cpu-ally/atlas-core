name: Frontend HUD Check

on:
  push:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-hud-check.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-hud-check.yml'

permissions:
  contents: read

jobs:
  build-hud:
    name: Build ATLAS HUD
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build production HUD
        env:
          CI: 'true'
        run: yarn build
